<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page Not Found | Swati Iyer</title>
  <link rel="icon" type="image/png" href="assets/branding/swatiiyer-logo-tab.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0b14;
      --surface: #1a1525;
      --accent: #b388ff;
      --accent2: #ea80fc;
      --text: #e8e0f4;
      --muted: #7c6fa0;
      --mono: 'IBM Plex Mono', monospace;
      --display: 'Space Grotesk', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--display);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* floating pixel stars */
    .stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      background: var(--accent);
      border-radius: 50%;
      opacity: 0;
      animation: twinkle var(--dur, 3s) ease-in-out infinite var(--delay, 0s);
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0; transform: scale(1); }
      50% { opacity: 0.7; transform: scale(1.5); }
    }

    /* scanline overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.08) 2px,
        rgba(0,0,0,0.08) 4px
      );
      pointer-events: none;
      z-index: 1;
    }

    .container {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 2rem;
      max-width: 560px;
    }

    .error-code {
      font-family: var(--mono);
      font-size: clamp(6rem, 20vw, 10rem);
      font-weight: 600;
      line-height: 1;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -4px;
      animation: glitch 6s infinite;
    }

    @keyframes glitch {
      0%, 92%, 100% { transform: translate(0); filter: none; }
      93% { transform: translate(-3px, 1px); filter: hue-rotate(90deg); }
      94% { transform: translate(3px, -1px); filter: hue-rotate(-90deg); }
      95% { transform: translate(0); filter: none; }
      96% { transform: translate(2px, 2px); filter: hue-rotate(45deg); }
      97% { transform: translate(0); filter: none; }
    }

    .terminal-line {
      font-family: var(--mono);
      font-size: 0.85rem;
      color: var(--accent);
      margin: 0.5rem 0 1.5rem;
      opacity: 0.8;
    }
    .terminal-line::before { content: '> '; }

    h1 {
      font-size: clamp(1.4rem, 4vw, 2rem);
      font-weight: 700;
      color: var(--text);
      margin-bottom: 0.75rem;
      letter-spacing: -0.5px;
    }

    p {
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    .home-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #0e0b14;
      font-family: var(--mono);
      font-size: 0.9rem;
      font-weight: 600;
      text-decoration: none;
      padding: 0.75rem 1.75rem;
      border-radius: 100px;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 0 0 rgba(179,136,255,0);
    }
    .home-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(179,136,255,0.35);
    }

    .pixel-art {
      font-family: var(--mono);
      font-size: 0.6rem;
      line-height: 1.3;
      color: var(--muted);
      opacity: 0.4;
      margin-bottom: 1.5rem;
      letter-spacing: 2px;
    }
  </style>
</head>
<body>

  <div class="stars" id="stars"></div>

  <div class="container">
    <div class="error-code">404</div>
    <div class="terminal-line">page_not_found.exe has stopped working</div>
    <div class="pixel-art">
* . * . . * . * .<br>
. * ░░░░░░░░░ * .<br>
* . ░  ¯\_(ツ)_/¯  ░ * .<br>
. * ░░░░░░░░░ * .<br>
* . * . . * . * .
    </div>
    <h1>Nothing here but vibes.</h1>
    <p>This page doesn't exist, was moved, or you followed a broken link. Either way, let's get you back.</p>
    <a href="/" class="home-btn">← Back to home</a>
  </div>

  <script>
    // spawn pixel stars
    const container = document.getElementById('stars');
    for (let i = 0; i < 60; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      s.style.cssText = `
        left: ${Math.random() * 100}%;
        top: ${Math.random() * 100}%;
        --dur: ${2 + Math.random() * 4}s;
        --delay: ${Math.random() * 4}s;
        width: ${Math.random() > 0.7 ? 3 : 2}px;
        height: ${Math.random() > 0.7 ? 3 : 2}px;
        background: ${Math.random() > 0.5 ? 'var(--accent)' : 'var(--accent2)'};
      `;
      container.appendChild(s);
    }
  </script>
</body>
</html>
